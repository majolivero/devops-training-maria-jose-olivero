#Parte 1. Deployment ("El despliegue de la aplicación en Kubernetes")
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculadora-back   # Nombre único para identificar este despliegue
  namespace: #{K8S_NAMESPACE}# # El "barrio" o espacio de trabajo donde vivirá este despliegue
spec:
  replicas: 1 # Cuántas copias (Pods) de tu app quieres encendidas
  selector:
    matchLabels:
      app: calculadora-app   # Etiqueta para que el Service encuentre estos Pods
  template:
    metadata:
      labels:
        app: calculadora-app   # Etiqueta que identifica a los Pods de este despliegue
    spec:
      containers:
      - name: calculadora-container  # Nombre del contenedor dentro del Pod
        image: #{ACR_NAME}#.azurecr.io/calculadora:#{Build.BuildId}#  # Se actualizará en el pipeline
        ports:
        - containerPort: #{APP_PORT}#  # Puerto donde tu app escucha dentro del contenedor
      imagePullSecrets:
      - name: acr-secret  # Referencia al secreto para acceder al ACR privado
---
#Parte 2. Service ("Exponer la aplicación para que sea accesible desde fuera del clúster")
# apiVersion: v1
# kind: Service      #(1) Tipo de recurso que define cómo exponer tu aplicación al mundo exterior
# metadata:
#   name: calculadora-service
#   namespace: calculadora-ns
# spec:
#   type: LoadBalancer # ¡ESTO ES CLAVE! Azure creará una IP PÚBLICA real para este servicio
#   ports:
#   - port: 80    # El puerto por el que entran los usuarios (Navegador)
#     targetPort: 8080   # A qué puerto del contenedor debe enviarse el tráfico
#   selector:
#     app: calculadora-app  # Conecta este Service con los Pods del Deployment

---
#NUEVA CONFIGURACIÓN: Service Interno (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: calculadora-service
  namespace: #{K8S_NAMESPACE}#
spec:
  type: ClusterIP    # El backend ahora es privado y solo accesible dentro del clúster
  ports:
  - port: #{APP_PORT}#       # Puerto donde escuchará el servicio internamente
    targetPort: #{APP_PORT}#   # Puerto del contenedor de la aplicación
  selector:
    app: calculadora-app  # Conecta con los Pods del Deployment
