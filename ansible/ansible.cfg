# Configuración de Ansible
# ========================

[defaults]
# Inventario por defecto
inventory = ./inventory.ini

# Usuario por defecto para conexiones SSH
remote_user = azureuser

# Desactivar verificación de clave de host (útil para VMs nuevas)
host_key_checking = False

# Mostrar deprecation warnings (para mantener limpio el output)
deprecation_warnings = False

# Timeout para conexiones SSH (segundos)
timeout = 30

# Número de hosts en paralelo
forks = 5

# Modo de gathering de facts (información del sistema)
# 'smart' = recolecta información inteligentemente
gathering = smart

# Ubicación del log de ejecución
log_path = ./ansible.log

# Permitir plugins sin firmar
allow_world_readable_tmpfiles = True

[privilege_escalation]
# Usar sudo para tareas que lo requieran
become = False
become_method = sudo
become_user = root
become_ask_pass = False
