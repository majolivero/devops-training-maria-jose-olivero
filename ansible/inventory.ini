# Inventario de Ansible
# Define los servidores donde ejecutar tareas

[calculadora_vm]
vm_azure ansible_host=172.182.232.165 ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/azure_vm

[calculadora_vm:vars]
# Variables que se aplican a todos los hosts del grupo
app_name=calculadora
app_version=0.0.1-SNAPSHOT
app_port=8080
java_home=/usr/lib/jvm/java-17-openjdk-amd64

[all:vars]
# Configuración global de Ansible
ansible_connection=ssh
ansible_become_method=sudo
