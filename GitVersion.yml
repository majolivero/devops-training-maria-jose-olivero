assembly-versioning-scheme: MajorMinorPatch
assembly-file-versioning-scheme: MajorMinorPatch
mode: ContinuousDeployment
tag-prefix: '^(?!.*\.)\d+\.\d+\.\d+$'
semantic-version-format: '{Major}.{Minor}.{Patch}'
continuous-delivery-fallback-tag: ci
version-in-branch-name: false
major-version-bump-message: '^(break|breaking)'
minor-version-bump-message: '^feat'
patch-version-bump-message: '^fix|^hotfix'
no-bump-message: '^(docs|chore|style|refactor|perf|test)'
legacy-semver-padding: 4
build-metadata-padding: 4
commits-since-version-source-padding: 4
commit-message-incrementing: Enabled
branches:
  master:
    regex: ^master$|^main$
    mode: ContinuousDeployment
    tag: ''
    increment: Patch
    prevent-increment: false
    track-merge-target: false
    tracks-release-branches: false
    is-release-branch: false
  release:
    regex: ^releases?[-/]
    mode: ContinuousDeployment
    tag: 'beta'
    increment: Patch
    prevent-increment: false
    track-merge-target: false
    tracks-release-branches: false
    is-release-branch: true
  develop:
    regex: ^develop$|^dev$
    mode: ContinuousDeployment
    tag: 'alpha'
    increment: Minor
    prevent-increment: false
    track-merge-target: true
    tracks-release-branches: false
    is-release-branch: false
  feature:
    regex: ^features?[-/]
    mode: ContinuousDeployment
    tag: 'feature'
    increment: Patch
    prevent-increment: false
    track-merge-target: false
    tracks-release-branches: false
    is-release-branch: false
  pull-request:
    regex: ^pull/
    mode: ContinuousDeployment
    tag: 'pr'
    increment: Patch
    prevent-increment: false
    track-merge-target: false
    tracks-release-branches: false
    is-release-branch: false
