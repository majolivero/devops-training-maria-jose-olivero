mode: ContinuousDeployment
next-version: 2.1.0
assembly-versioning-scheme: MajorMinorPatch
assembly-file-versioning-scheme: MajorMinorPatch
increment: Patch
commit-message-incrementing: Enabled
major-version-bump-message: '^break:|^breaking:'
minor-version-bump-message: '^feat:'
patch-version-bump-message: '^fix:'

# CONFIGURACIÓN DE RAMAS (Formato v6)
branches:
  master:
    mode: ContinuousDeployment
    label: '' # <--- ANTES ERA 'tag'. Al dejarlo vacío quita el "-ci"
    increment: Patch
    prevent-incremental-version: false
    track-merge-target: false
    regex: ^master$|^main$