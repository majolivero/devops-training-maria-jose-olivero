# ============================================================
# PLANTILLA BASE (CEREBRO) - Repo B
# ============================================================
# Los repos que hereden de esta plantilla con "extends"
# deben pasar los parámetros requeridos.
# ============================================================

parameters:
  # -- Parámetros del pool --
  - name: vmImage
    type: string
    default: 'ubuntu-latest'

  # -- Parámetros del Variable Group --
  - name: variableGroup
    type: string

  # -- Parámetros de Build (Gradle) --
  - name: gradleWrapperFile
    type: string
    default: 'gradlew'
  - name: gradleTasks
    type: string
    default: 'clean build'
  - name: jdkVersion
    type: string
    default: '17'

  # -- Parámetros de SonarCloud --
  - name: sonarServiceConnection
    type: string
  - name: sonarOrganization
    type: string
  - name: sonarProjectKey
    type: string
  - name: sonarProjectName
    type: string

  # -- Parámetros de Azure / Infra --
  - name: azureSubscription
    type: string
  - name: storageAccountName
    type: string
  - name: resourceGroup
    type: string
  - name: storageLocation
    type: string
    default: 'eastus'

  # -- Parámetros de Docker --
  - name: dockerImageName
    type: string
  - name: dockerfilePath
    type: string
    default: 'Dockerfile'

  # -- Parámetros de Terraform --
  - name: terraformDir
    type: string
    default: 'terraform'

  # -- Parámetros de SSH --
  - name: sshSecureFileName
    type: string
    default: 'azure_vm.pub'

  # -- Parámetros de Helm / K8s --
  - name: helmChartPath
    type: string
    default: './helm/calculadora'
  - name: helmReleaseName
    type: string
    default: 'calculadora'
  - name: aksClusterName
    type: string
  - name: aksResourceGroup
    type: string

  # -- Parámetros de token replacement --
  - name: tokenTargetFiles
    type: string
    default: |
      terraform/*.tfvars
      helm/calculadora/values.yaml

  # -- Artefacto: patrón del archivo generado --
  - name: artifactContents
    type: string
    default: '**/*.jar'

  # -- Steps adicionales que el repo hijo puede inyectar --
  - name: preDeploySteps
    type: stepList
    default: []
  - name: postDeploySteps
    type: stepList
    default: []

stages:

# ----------------------------------------------------------------
# ETAPA 1: Construcción y Análisis de Calidad (SonarCloud)
# ----------------------------------------------------------------
- stage: DevelopmentIntegration
  displayName: 'Development Integration'
  jobs:
  - job: BuildAndSonarJob
    displayName: 'Development Integration'
    pool:
      vmImage: ${{ parameters.vmImage }}
      demands: java
    variables:
      - group: ${{ parameters.variableGroup }}
      - name: PUBLIC_KEY_PATH
        value: '$(sshPublicKey.secureFilePath)'
    steps:
    - script: ls -la

    # Tarea: Compilar con Gradle
    - task: Gradle@3
      displayName: 'Gradle - Compilar, Test y Build'
      inputs:
        gradleWrapperFile: ${{ parameters.gradleWrapperFile }}
        tasks: ${{ parameters.gradleTasks }}
        jdkVersionOption: ${{ parameters.jdkVersion }}

    # Tarea: Preparar SonarCloud
    - task: SonarSource.sonarcloud.14d9cde6-c1da-4d55-aa01-2965cd301255.SonarCloudPrepare@4
      displayName: 'SonarCloud - Preparar Análisis'
      inputs:
        SonarQube: ${{ parameters.sonarServiceConnection }}
        organization: ${{ parameters.sonarOrganization }}
        projectKey: ${{ parameters.sonarProjectKey }}
        projectName: ${{ parameters.sonarProjectName }}

    # Tarea: Ejecutar análisis SonarCloud
    - task: Gradle@3
      displayName: ' Gradle - Ejecutar SonarQube'
      inputs:
        gradleWrapperFile: ${{ parameters.gradleWrapperFile }}
        tasks: 'sonarqube'
        jdkVersionOption: ${{ parameters.jdkVersion }}

    # Tarea: Publicar Quality Gate
    - task: SonarSource.sonarcloud.38b27399-a642-40af-bb7d-9971f69712e8.SonarCloudPublish@4
      displayName: ' SonarCloud - Publicar Quality Gate'

    # Tarea: Copiar artefactos
    - task: CopyFiles@2
      displayName: 'Copiar Artefactos'
      inputs:
        SourceFolder: '$(system.defaultworkingdirectory)'
        Contents: ${{ parameters.artifactContents }}
        TargetFolder: '$(build.artifactstagingdirectory)'
      condition: succeededOrFailed()

    # Tarea: Publicar artefacto
    - task: PublishBuildArtifacts@1
      displayName: 'Publicar Artefacto drop'
      inputs:
        PathtoPublish: '$(build.artifactstagingdirectory)'
      condition: succeededOrFailed()

# ----------------------------------------------------------------
# ETAPA 2: Terraform Infrastructure
# ----------------------------------------------------------------
- stage: TerraformInfrastructure
  displayName: 'Terraform Infrastructure'
  jobs:
  - job: TerraformInfrastructureJob
    displayName: 'Terraform Infrastructure'
    pool:
      vmImage: ${{ parameters.vmImage }}
    variables:
      - group: ${{ parameters.variableGroup }}
      - name: PUBLIC_KEY_PATH
        value: '$(sshPublicKey.secureFilePath)'
    steps:

    # Steps adicionales antes del deploy (inyectados por el repo hijo)
    - ${{ each step in parameters.preDeploySteps }}:
      - ${{ step }}

    # Tarea: Descargar SSH key   ----Revisarlo ------
    - task: DownloadSecureFile@1
      name: sshPublicKey
      displayName: 'Descargar SSH Public Key'
      inputs:
        secureFile: ${{ parameters.sshSecureFileName }}

    # Tarea: Exportar PUBLIC_KEY_PATH como variable de pipeline
    - script: echo "##vso[task.setvariable variable=PUBLIC_KEY_PATH]$(sshPublicKey.secureFilePath)"
      displayName: 'Exportar PUBLIC_KEY_PATH como variable de pipeline'

    # Tarea: Leer contenido SSH Public Key y exportar como variable
    - script: echo "##vso[task.setvariable variable=SSH_PUBLIC_KEY]$(cat $(sshPublicKey.secureFilePath))"
      displayName: 'Leer y exportar SSH Public Key como variable'

    # Tarea: Crear Storage Account para Terraform State
    - task: AzureCLI@2
      displayName: 'Infra - Crear Storage Account para Terraform'
      inputs:
        azureSubscription: ${{ parameters.azureSubscription }}
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az storage account create --name ${{ parameters.storageAccountName }} --resource-group ${{ parameters.resourceGroup }} --location ${{ parameters.storageLocation }} --sku Standard_LRS --min-tls-version TLS1_2
          az storage container create --name tfstate --account-name ${{ parameters.storageAccountName }} --auth-mode login

    # Tarea: Reemplazar tokens
    - task: qetza.replacetokens.replacetokens-task.replacetokens@6
      displayName: 'Reemplazar tokens en tfvars y values.yaml'
      inputs:
        targetFiles: ${{ parameters.tokenTargetFiles }}
        tokenPrefix: '#{'
        tokenSuffix: '}#'

    # Tarea: Instalar Terraform
    - task: TerraformInstaller@1
      displayName: 'Instalar Terraform'
      inputs:
        terraformVersion: 'latest'

    # Tarea: Terraform Init y Apply
    - task: AzureCLI@2
      displayName: 'Terraform - Init y Apply'
      inputs:
        azureSubscription: ${{ parameters.azureSubscription }}
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Asegurando Storage Account para el Estado..."
          az storage account create --name ${{ parameters.storageAccountName }} --resource-group ${{ parameters.resourceGroup }} --location ${{ parameters.storageLocation }} --sku Standard_LRS --min-tls-version TLS1_2
          az storage container create --name tfstate --account-name ${{ parameters.storageAccountName }} --auth-mode login

          cd ${{ parameters.terraformDir }}
          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_CLIENT_SECRET=$servicePrincipalKey
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(subscription_id)

          terraform init -input=false
          terraform apply -auto-approve -input=false -lock-timeout=5m -var="ssh_public_key=$(SSH_PUBLIC_KEY)"
        addSpnToEnvironment: true
      env:
        SSH_PUBLIC_KEY: $(SSH_PUBLIC_KEY)
        subscription_id: $(subscription_id)

# ----------------------------------------------------------------
# ETAPA 3: Docker & Artifact Management
# ----------------------------------------------------------------
- stage: DockerArtifactManagement
  displayName: 'Docker & Artifact Management'
  dependsOn: TerraformInfrastructure
  condition: succeeded()
  jobs:
  - job: DockerBuildJob
    displayName: 'Docker Build & Push'
    pool:
      vmImage: ${{ parameters.vmImage }}
    variables:
      - group: ${{ parameters.variableGroup }}
    steps:

    # Tarea: Descargar artefacto de la etapa anterior
    - task: DownloadBuildArtifacts@0
      displayName: 'Tarea: Descargar Artefacto de Build'
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(System.ArtifactsDirectory)'

    # Paso de Script: Restaurar estructura de build para Docker
    - script: |
        mkdir -p build/libs
        find $(System.ArtifactsDirectory)/drop -name "*.jar" -exec cp {} build/libs/calculator-java-gradle-0.0.1-SNAPSHOT.jar \;
        ls -R build/libs/
      displayName: 'Script: Restaurar estructura para Docker'

    # Tarea: Reemplazar tokens en Helm values
    - task: qetza.replacetokens.replacetokens-task.replacetokens@6
      displayName: 'Reemplazar tokens en helm values.yaml'
      inputs:
        targetFiles: ${{ parameters.helmChartPath }}/values.yaml
        tokenPrefix: '#{'
        tokenSuffix: '}#'

    # Tarea: Docker Build y Push al ACR
    - task: AzureCLI@2
      displayName: 'Docker - Build y Push a ACR'
      inputs:
        azureSubscription: ${{ parameters.azureSubscription }}
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name $(ACR_NAME)
          docker build --build-arg BUILD_ID=$(Build.BuildId) -t $(ACR_NAME).azurecr.io/${{ parameters.dockerImageName }}:$(Build.BuildId) ${{ parameters.dockerfilePath }}
          docker tag $(ACR_NAME).azurecr.io/${{ parameters.dockerImageName }}:$(Build.BuildId) $(ACR_NAME).azurecr.io/${{ parameters.dockerImageName }}:latest
          docker push $(ACR_NAME).azurecr.io/${{ parameters.dockerImageName }}:$(Build.BuildId)
          docker push $(ACR_NAME).azurecr.io/${{ parameters.dockerImageName }}:latest

# ----------------------------------------------------------------
# ETAPA 4: Kubernetes Deployment
# ----------------------------------------------------------------
- stage: KubernetesDeployment
  displayName: 'Kubernetes Deployment'
  dependsOn: DockerArtifactManagement
  condition: succeeded()
  jobs:
  - job: KubernetesDeploymentJob
    displayName: 'Kubernetes Deployment'
    pool:
      vmImage: ${{ parameters.vmImage }}
    variables:
      - group: ${{ parameters.variableGroup }}
    steps:

    # Tarea: Obtener credenciales de AKS y crear namespace (sin piping, sin validación)
    - task: AzureCLI@2
      displayName: 'AKS - Obtener Credenciales y Crear Namespace'
      inputs:
        azureSubscription: ${{ parameters.azureSubscription }}
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials --resource-group ${{ parameters.aksResourceGroup }} --name ${{ parameters.aksClusterName }} --overwrite-existing
          kubectl create namespace $(K8S_NAMESPACE) 2>/dev/null || echo "Namespace already exists"
      continueOnError: true

    # Tarea: Instalar Helm
    - task: HelmInstaller@1
      displayName: 'Tarea: Instalar Helm'
      inputs:
        helmVersionToInstall: 'latest'

    # Tarea: Obtener credenciales ACR y crear secret (sin validación remota)
    - task: AzureCLI@2
      displayName: 'ACR - Habilitar Admin, obtener credenciales y crear Secret'
      inputs:
        azureSubscription: ${{ parameters.azureSubscription }}
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr update -n $(ACR_NAME) --admin-enabled true
          ACR_PASSWORD=$(az acr credential show --name $(ACR_NAME) --query passwords[0].value -o tsv)
          
          kubectl create secret docker-registry acr-secret \
            --namespace $(K8S_NAMESPACE) \
            --docker-server=$(ACR_NAME).azurecr.io \
            --docker-username=$(ACR_NAME) \
            --docker-password=$ACR_PASSWORD \
            2>/dev/null || echo "Secret already exists"

    # Tarea: Eliminar recursos previos (opcional)
    - task: AzureCLI@2
      displayName: 'K8s - Limpiar Recursos Previos'
      inputs:
        azureSubscription: ${{ parameters.azureSubscription }}
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          kubectl delete service calculadora-service -n $(K8S_NAMESPACE) --ignore-not-found=true
          kubectl delete deployment calculadora-back -n $(K8S_NAMESPACE) --ignore-not-found=true
      continueOnError: true

    # Tarea: Desplegar con Helm
    - task: AzureCLI@2
      displayName: 'Helm - Actualizar/Instalar Release'
      inputs:
        azureSubscription: ${{ parameters.azureSubscription }}
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          helm uninstall ${{ parameters.helmReleaseName }} -n $(K8S_NAMESPACE) --wait --ignore-not-found=true || true
          sleep 10
          helm install ${{ parameters.helmReleaseName }} ${{ parameters.helmChartPath }} \
            --namespace $(K8S_NAMESPACE) \
            --wait --timeout 15m
      continueOnError: true

    # Tarea: Debuggear estado de Pods
    - task: AzureCLI@2
      displayName: 'Debuggear - Ver estado de Pods y logs'
      inputs:
        azureSubscription: ${{ parameters.azureSubscription }}
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "=== Pods en namespace $(K8S_NAMESPACE) ==="
          kubectl get pods -n $(K8S_NAMESPACE) -o wide
          
          echo ""
          echo "=== Descripción detallada de Pods ==="
          kubectl describe pods -n $(K8S_NAMESPACE)
          
          echo ""
          echo "=== Logs del Pod ==="
          kubectl logs -n $(K8S_NAMESPACE) -l app=calculadora-app --tail=50 || echo "No logs available"
          
          echo ""
          echo "=== Events en namespace ==="
          kubectl get events -n $(K8S_NAMESPACE) --sort-by='.lastTimestamp'
      continueOnError: true

    # Steps adicionales después del deploy (inyectados por el repo hijo)
    - ${{ each step in parameters.postDeploySteps }}:
      - ${{ step }}
