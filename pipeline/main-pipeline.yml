#Configuración del entorno (pool) y variables
trigger: none

pool:
  vmImage: 'ubuntu-latest'
  demands: java

variables:
  wrapperScript: 'gradlew'
  tasks: 'clean test jacocoTestReport build'

#Paso 1. Compilación y pruebas con Gradle
steps:
- task: Gradle@3
  displayName: 'gradlew clean test jacocoTestReport build'
  inputs:
    gradleWrapperFile: '$(wrapperScript)'
    tasks: '$(tasks)'
    jdkVersionOption: '17'

#Paso 2. Preparación de SonarCloud
- task: SonarSource.sonarcloud.14d9cde6-c1da-4d55-aa01-2965cd301255.SonarCloudPrepare@4
  displayName: 'Prepare analysis on SonarQube Cloud'
  inputs:
    SonarQube: SonarCloud-Majo
    organization: quind
    projectKey: com.entrenamiento.Calculadora
    projectName: 'Calculadora'

#Paso 3. Análisis de Código con SonarCloud
- task: Gradle@3
  displayName: 'Execute sonarqube analysis'
  inputs:
    gradleWrapperFile: '$(wrapperScript)'
    tasks: 'sonarqube'
    jdkVersionOption: '17'

#Paso 4. Publicación de resultados de SonarCloud
- task: SonarSource.sonarcloud.38b27399-a642-40af-bb7d-9971f69712e8.SonarCloudPublish@4
  displayName: 'Publish Quality Gate Result'

- task: CopyFiles@2
  displayName: 'Copy Files to: $(build.artifactstagingdirectory)'
  inputs:
    SourceFolder: '$(system.defaultworkingdirectory)'
    Contents: '**/*.jar'
    TargetFolder: '$(build.artifactstagingdirectory)'
  condition: succeededOrFailed()

#Paso 5. Gestión de artefactos: Publicación de los archivos .jar generados
- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: drop'
  inputs:
    PathtoPublish: '$(build.artifactstagingdirectory)'
  condition: succeededOrFailed()

# Automatización de Infraestructura y Contenedores
- task: TerraformInstaller@1
  displayName: 'Instalar Terraform'
  inputs:
    terraformVersion: 'latest'

# Usamos AzureCLI para que se encargue del login automáticamente
- task: AzureCLI@2
  displayName: 'Terraform: Init & Apply'
  inputs:
    azureSubscription: 'sc-majo-terraform-v2'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      # 1. Automatizar la creación del Storage Account y Contenedor para el Estado
      # Si ya existen, el comando no hará nada (Idempotencia).
      echo "Asegurando existencia del Storage Account para el Estado..."
      az storage account create --name stmajo1773169612 --resource-group resource-group-maria-jose-olivero --location eastus --sku Standard_LRS --min-tls-version TLS1_2
      az storage container create --name tfstate --account-name stmajo1773169612 --auth-mode login

      cd terraform
      
      # 2. Inyectar credenciales y usar Llave SSH desde Secreto
      export ARM_CLIENT_ID=$servicePrincipalId
      export ARM_CLIENT_SECRET=$servicePrincipalKey
      export ARM_TENANT_ID=$tenantId
      export ARM_SUBSCRIPTION_ID=$(subscription_id)
      
      echo "Iniciando Terraform..."
      # 3. Inicializar (Limpio, sin memoria previa)
      terraform init -input=false
      
      # 4. Crear infraestructura usando la variable SSH_PUBLIC_KEY de Azure DevOps
      terraform apply -auto-approve -input=false -var="ssh_public_key=$(SSH_PUBLIC_KEY)"
    addSpnToEnvironment: true
  env:
    # Mapeamos la variable secreta para que el script de bash la pueda ver
    SSH_PUBLIC_KEY: $(SSH_PUBLIC_KEY)
    subscription_id: $(subscription_id)

# Construcción de imagen Docker y subida al Azure Container Registry (ACR)
- task: AzureCLI@2
  displayName: 'Docker: Build and Push to ACR'
  inputs:
    azureSubscription: 'sc-majo-terraform-v2'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      # 1. Login (Autenticación)
      # "az acr login" usa la sesión actual del agente para entrar al registro privado.
      az acr login --name acrmajolivero1772830059

      # 2. Build (Empaquetado)
      # Toma el código de la calculadora y crea una imagen. 
      # "$(Build.BuildId)" es un número único (ej: 450) para rastrear cada versión.
      docker build -t acrmajolivero1772830059.azurecr.io/calculadora:$(Build.BuildId) .

      # 3. Tag (Etiquetado)
      # Marcamos la misma imagen como "latest" (la más reciente). 
      # Esto facilita saber cuál es la versión que debe estar en producción.
      docker tag acrmajolivero1772830059.azurecr.io/calculadora:$(Build.BuildId) acrmajolivero1772830059.azurecr.io/calculadora:latest

      # 4. Push (Subida)
      # Envía la imagen desde el agente de build hacia tu ACR en la nube de Azure.
      docker push acrmajolivero1772830059.azurecr.io/calculadora:$(Build.BuildId)
      docker push acrmajolivero1772830059.azurecr.io/calculadora:latest

# Despliegue en AKS usando la imagen recién construida
- task: AzureCLI@2
  displayName: 'AKS: Deploy Application'
  inputs:
    azureSubscription: 'sc-majo-terraform-v2'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      # 1. Obtener credenciales del clúster AKS (Kubeconfig)
      # Esto configura kubectl para hablar con tu clúster
      az aks get-credentials --resource-group resource-group-maria-jose-olivero --name aks-calculadora-majo --overwrite-existing

      # 2. Crear el namespace si no existe
      # El comando "create namespace" fallaría si ya existe, por eso usamos "apply" o verificamos
      kubectl create namespace calculadora-ns --dry-run=client -o yaml | kubectl apply -f -

      # 3. Reemplazar la imagen en el manifiesto con la versión actual (Build.BuildId)
      # Esto asegura que despliegas exactamente lo que acabas de compilar
      sed -i "s|image: acrmajolivero1772830059.azurecr.io/calculadora:latest|image: acrmajolivero1772830059.azurecr.io/calculadora:$(Build.BuildId)|g" k8s/calculadora-deploy.yaml

      # 4. Aplicar los manifiestos
      # -f k8s/ aplica tanto el Deployment como el Service
      kubectl apply -f k8s/calculadora-deploy.yaml

      # 5. Verificar el despliegue
      kubectl rollout status deployment/calculadora-back -n calculadora-ns
