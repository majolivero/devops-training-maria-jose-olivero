#Configuración del entorno (pool) y variables
trigger: none

pool:
  vmImage: 'ubuntu-latest'
  demands: java

variables:
  # Todas las variables están centralizadas en el grupo de la librería de Azure DevOps
  # Pipelines > Library > Variable Groups > calculadora-secrets-majo
  # Variables del grupo: SSH_PUBLIC_KEY, subscription_id, wrapperScript, tasks,
  # ACR_NAME, K8S_NAMESPACE, APP_PORT, RESOURCE_GROUP, LOCATION, VM_SIZE,
  # ADMIN_USERNAME, VM_NAME, VNET_NAME, SUBNET_NAME, NIC_NAME, PUBLIC_IP_NAME,
  # NSG_NAME, AKS_CLUSTER_NAME, AKS_DNS_PREFIX, AKS_NODE_COUNT, AKS_NODE_VM_SIZE
  - group: calculadora-secrets-majo
  # PUBLIC_KEY_PATH no puede ir en la librería: su valor ($(sshPublicKey.secureFilePath))
  # es una ruta de runtime que solo existe después de ejecutar la tarea DownloadSecureFile@1
  - name: PUBLIC_KEY_PATH
    value: '$(sshPublicKey.secureFilePath)'

# ==========================================
# DEFINICIÓN DE ETAPAS (STAGES)
# ==========================================
stages:

# ----------------------------------------------------------------
# ETAPA 1: Construcción y Análisis de Calidad (SonarCloud)
# ----------------------------------------------------------------
- stage: BuildAndSonar
  displayName: 'Etapa: Construcción y Análisis Sonar'
  jobs:
  - job: BuildAndSonarJob
    displayName: 'Compilar y Analizar'
    # Pasos (Steps) que se ejecutan en este trabajo
    steps:
    
    # Tarea (Task): Crear infraestructura básica para el estado si no existe
    - task: AzureCLI@2
      displayName: 'Tarea: Infra - Crear Storage Account para Terraform'
      inputs:
        azureSubscription: 'sc-majo-terraform-v2'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az storage account create --name stmajo1773169612 --resource-group resource-group-maria-jose-olivero --location eastus --sku Standard_LRS --min-tls-version TLS1_2
          az storage container create --name tfstate --account-name stmajo1773169612 --auth-mode login

    # Tarea: Ejecutar Gradle para compilar y probar
    - task: Gradle@3
      displayName: 'Tarea: Gradle - Compilar, Test y Build'
      inputs:
        gradleWrapperFile: '$(wrapperScript)'
        tasks: '$(tasks)'
        jdkVersionOption: '17'

    # Tarea: Configurar SonarCloud
    - task: SonarSource.sonarcloud.14d9cde6-c1da-4d55-aa01-2965cd301255.SonarCloudPrepare@4
      displayName: 'Tarea: SonarCloud - Preparar Análisis'
      inputs:
        SonarQube: SonarCloud-Majo
        organization: quind
        projectKey: com.entrenamiento.Calculadora
        projectName: 'Calculadora'

    # Tarea: Ejecutar análisis de Sonar con Gradle
    - task: Gradle@3
      displayName: 'Tarea: Gradle - Ejecutar SonarQube'
      inputs:
        gradleWrapperFile: '$(wrapperScript)'
        tasks: 'sonarqube'
        jdkVersionOption: '17'

    # Tarea: Publicar resultados de calidad
    - task: SonarSource.sonarcloud.38b27399-a642-40af-bb7d-9971f69712e8.SonarCloudPublish@4
      displayName: 'Tarea: SonarCloud - Publicar Quality Gate'

    # Tarea: Copiar el .jar generado a la carpeta de artefactos
    - task: CopyFiles@2
      displayName: 'Tarea: Copiar Artefactos .jar'
      inputs:
        SourceFolder: '$(system.defaultworkingdirectory)'
        Contents: '**/*.jar'
        TargetFolder: '$(build.artifactstagingdirectory)'
      condition: succeededOrFailed()

    # Tarea: Publicar oficialmente el artefacto en Azure DevOps
    - task: PublishBuildArtifacts@1
      displayName: 'Tarea: Publicar Artefacto drop'
      inputs:
        PathtoPublish: '$(build.artifactstagingdirectory)'
      condition: succeededOrFailed()

# ----------------------------------------------------------------
# ETAPA 2: Terraform, Docker y Despliegue en Kubernetes (AKS)
# ----------------------------------------------------------------
- stage: TerraformAndDeploy
  displayName: 'Etapa: Infraestructura y Despliegue'
  dependsOn: BuildAndSonar
  condition: succeeded()
  jobs:
  - job: TerraformAndDeployJob
    displayName: 'Terraform y Kubernetes'
    steps:
    
    # Tarea: Descargar el .jar de la etapa anterior
    - task: DownloadBuildArtifacts@0
      displayName: 'Tarea: Descargar Artefacto de Build'
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(System.ArtifactsDirectory)'

    # Paso de Script: Reconstruir la ruta que espera el Dockerfile
    - script: |
        mkdir -p build/libs
        find $(System.ArtifactsDirectory)/drop -name "*.jar" -exec cp {} build/libs/calculator-java-gradle-0.0.1-SNAPSHOT.jar \;
        ls -R build/libs/
      displayName: 'Script: Restaurar estructura para Docker'

    # Tarea: Descargar la llave pública SSH desde Secure Files
    - task: DownloadSecureFile@1
      name: sshPublicKey
      displayName: 'Tarea: Descargar SSH Public Key desde Secure Files'
      inputs:
        secureFile: 'azure_vm.pub'

    # Tarea: Reemplazar tokens en tfvars antes de Terraform
    - task: qetza.replacetokens.replacetokens-task.replacetokens@6
      displayName: 'Tarea: Reemplazar tokens en tfvars'
      inputs:
        targetFiles: 'terraform/*.tfvars'
        tokenPrefix: '#{'
        tokenSuffix: '}#'

    # Tarea: Instalar herramienta Terraform
    - task: TerraformInstaller@1
      displayName: 'Tarea: Instalar Terraform'
      inputs:
        terraformVersion: 'latest'

    # Tarea: Ejecutar Terraform Init y Apply
    - task: AzureCLI@2
      displayName: 'Tarea: Terraform - Init y Apply'
      inputs:
        azureSubscription: 'sc-majo-terraform-v2'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Asegurando Storage Account para el Estado..."
          az storage account create --name stmajo1773169612 --resource-group resource-group-maria-jose-olivero --location eastus --sku Standard_LRS --min-tls-version TLS1_2
          az storage container create --name tfstate --account-name stmajo1773169612 --auth-mode login

          cd terraform
          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_CLIENT_SECRET=$servicePrincipalKey
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(subscription_id)
          
          terraform init -input=false
          terraform apply -auto-approve -input=false -var="ssh_public_key=$(SSH_PUBLIC_KEY)"
        addSpnToEnvironment: true
      env:
        SSH_PUBLIC_KEY: $(SSH_PUBLIC_KEY)
        subscription_id: $(subscription_id)

    # Tarea: Construir imagen Docker y subirla al ACR
    - task: AzureCLI@2
      displayName: 'Tarea: Docker - Build y Push a ACR'
      inputs:
        azureSubscription: 'sc-majo-terraform-v2'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name $(ACR_NAME)
          docker build --build-arg BUILD_ID=$(Build.BuildId) -t $(ACR_NAME).azurecr.io/calculadora:$(Build.BuildId) .
          docker tag $(ACR_NAME).azurecr.io/calculadora:$(Build.BuildId) $(ACR_NAME).azurecr.io/calculadora:latest
          docker push $(ACR_NAME).azurecr.io/calculadora:$(Build.BuildId)
          docker push $(ACR_NAME).azurecr.io/calculadora:latest

    # Tarea: Instalar Helm en el agente
    - task: HelmInstaller@1
      displayName: 'Tarea: Instalar Helm'
      inputs:
        helmVersionToInstall: 'latest'

    # Tarea: Desplegar en el clúster de Kubernetes (AKS)
    - task: AzureCLI@2
      displayName: 'Tarea: AKS - Desplegar Aplicación'
      inputs:
        azureSubscription: 'sc-majo-terraform-v2'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials --resource-group resource-group-maria-jose-olivero --name aks-calculadora-majo --overwrite-existing
          kubectl create namespace $(K8S_NAMESPACE) --dry-run=client -o yaml | kubectl apply -f -
          az acr update -n $(ACR_NAME) --admin-enabled true
          ACR_PASSWORD=$(az acr credential show --name $(ACR_NAME) --query passwords[0].value -o tsv)

          kubectl create secret docker-registry acr-secret \
            --namespace $(K8S_NAMESPACE) \
            --docker-server=$(ACR_NAME).azurecr.io \
            --docker-username=$(ACR_NAME) \
            --docker-password=$ACR_PASSWORD \
            --dry-run=client -o yaml | kubectl apply -f -

          # Limpiar recursos viejos creados con kubectl apply
          kubectl delete service calculadora-service -n $(K8S_NAMESPACE) --ignore-not-found=true
          kubectl delete deployment calculadora-back -n $(K8S_NAMESPACE) --ignore-not-found=true

          # Este comando instala/actualiza la app en AKS con la imagen recién construida,
          # espera a que esté lista, y atomic: revierte automáticamente si algo falla.
          helm upgrade --install calculadora ./helm/calculadora \
            --namespace $(K8S_NAMESPACE) \
            --set image.repository=$(ACR_NAME).azurecr.io/calculadora \
            --set image.tag=$(Build.BuildId) \
            --set app.port=$(APP_PORT) \
            --set service.port=$(APP_PORT) \
            --wait --timeout 5m \
            --atomic
