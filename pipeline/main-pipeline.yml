#Configuración del entorno (pool) y variables
trigger: none

pool:
  name: 'Agent-Majo'

variables:
  # Todas las variables están centralizadas en el grupo de la librería de Azure DevOps
  # Pipelines > Library > Variable Groups > calculadora-secrets-majo
  # Variables del grupo: SSH_PUBLIC_KEY, subscription_id, wrapperScript, tasks,
  # ACR_NAME, K8S_NAMESPACE, APP_PORT, RESOURCE_GROUP, LOCATION, VM_SIZE,
  # ADMIN_USERNAME, VM_NAME, VNET_NAME, SUBNET_NAME, NIC_NAME, PUBLIC_IP_NAME,
  # NSG_NAME, AKS_CLUSTER_NAME, AKS_DNS_PREFIX, AKS_NODE_COUNT, AKS_NODE_VM_SIZE
  - group: calculadora-secrets-majo
  # PUBLIC_KEY_PATH no puede ir en la librería: su valor ($(sshPublicKey.secureFilePath))
  # es una ruta de runtime que solo existe después de ejecutar la tarea DownloadSecureFile@1
  - name: PUBLIC_KEY_PATH
    value: '$(sshPublicKey.secureFilePath)'

# ==========================================
# DEFINICIÓN DE ETAPAS (STAGES)
# ==========================================
stages:

# ----------------------------------------------------------------
# ETAPA 0: Semantic Versioning (Versionamiento Semántico)
# ----------------------------------------------------------------
- stage: SemanticVersioning
  displayName: 'Semantic Versioning'
  jobs:
  - job: SemanticVersionJob
    displayName: 'Semantic Version'
    pool:
      name: 'Agent-Majo'
    steps:
    - checkout: self   #Realiza un checkout del código fuente del repositorio actual
      fetchDepth: 0  #Obtener todo el historial de commits y tags (necesario para que GitVersion pueda calcular correctamente la versión semántica)
      fetchTags: true  #Asegura que se obtengan los tags del repositorio, lo cual es crucial para que GitVersion pueda identificar las versiones anteriores y calcular la nueva versión semántica correctamente. Sin esta opción, GitVersion podría no reconocer los tags existentes y generar versiones incorrectas.
    - script: |
        urlRepo='$(Build.Repository.Uri)'
        projectNameRepo=$(echo "$urlRepo" | awk -F/ '{print $4}')
        apiUrl="$(System.CollectionUri)$projectNameRepo/_apis/git/repositories/$(Build.Repository.Name)/refs?api-version=5.1"
        
        echo "Fetching tags from: $apiUrl"
        curl --request GET "$apiUrl" \
              --header 'Authorization: Bearer $(System.AccessToken)' -s | jq > tags.json
        
        echo "Tags response:"
        cat tags.json | jq 2>/dev/null || cat tags.json
        
        # Check if .value exists and is not null
        value_count=$(jq '.value | length' tags.json 2>/dev/null || echo 0)
        echo "Found $value_count refs"
        
        if [ "$value_count" -gt 0 ]; then
          echo -e "\e[32mList of repo $(Build.Repository.Name) refs:"
          jq -r '.value[] | select(.name != null) | .name' tags.json | while read -r tag; do
            if [[ "$tag" == @(refs/heads/master|refs/heads/release|refs/heads/develop) ]]; then
              echo -e "\e[32m✓ $tag (branch)"
            elif echo "$tag" | grep -q "refs/tags/v"; then
              echo -e "\e[31m✗ $tag (INVALID - has 'v' prefix)"
            elif echo "$tag" | grep -q "refs/tags/"; then
              echo -e "\e[32m✓ $tag (tag)"
            else
              echo -e "\e[32m✓ $tag (ref)"
            fi
          done
          
          # Check for invalid tags (starting with v)
          if jq -r '.value[] | select(.name | startswith("refs/tags/v")) | .name' tags.json 2>/dev/null | grep -q "refs/tags/v"; then
            echo -e "\e[31m⚠ WARNING: Found tags with 'v' prefix - these should be removed"
            echo -e "\e[31m→ Remove from: $(System.CollectionUri)$(System.TeamProject)/_git/$(Build.Repository.Name)/tags"
            exit 1
          else
            echo -e "\e[32m✓ All tags are correctly formatted"
          fi
        else
          echo -e "\e[32m✓ No semantic version tags found (OK for first run)"
        fi
      displayName: 'Validating tags'
    
    - task: gitversion/setup@0
      displayName: 'Install GitVersion'
      inputs:
        versionSpec: '6.0.x'

    - task: gitversion/execute@0
      displayName: 'Generate Semantic Version'
      inputs:
        useConfigFile: true
        configFilePath: '$(System.DefaultWorkingDirectory)/GitVersion.yml'  #Asegurarse de que la ruta al archivo GitVersion.yml sea correcta. Si el archivo está en la raíz del repositorio, esta ruta es adecuada. Si está en una subcarpeta, ajusta la ruta en consecuencia.
        targetPath: '$(Build.SourcesDirectory)'

# ----------------------------------------------------------------
# ETAPA 1: Development Integration (Construcción y Análisis)
# ----------------------------------------------------------------
- stage: DevelopmentIntegration
  displayName: 'Development Integration'
  dependsOn: SemanticVersioning
  jobs:
  - job: BuildAndSonarJob
    displayName: 'Compilar y Analizar'
    # Pasos (Steps) que se ejecutan en este trabajo
    steps:
    
    # Tarea: Establecer variables de entorno para Java
    - script: |
        echo "##vso[task.setvariable variable=JAVA_HOME_17_X64]/usr/lib/jvm/java-17-openjdk-amd64"
        echo "##vso[task.setvariable variable=JAVA_HOME]/usr/lib/jvm/java-17-openjdk-amd64"
      displayName: 'Tarea: Configurar variables de entorno JAVA'
      condition: eq(variables['Agent.OS'], 'Linux')
    
    # Tarea: Ejecutar Gradle para compilar y probar
    - task: Gradle@3
      displayName: 'Tarea: Gradle - Compilar, Test y Build'
      inputs:
        gradleWrapperFile: '$(wrapperScript)'
        tasks: '$(tasks)'
        jdkVersionOption: '17'

    # Tarea: Configurar SonarCloud
    - task: SonarSource.sonarcloud.14d9cde6-c1da-4d55-aa01-2965cd301255.SonarCloudPrepare@4
      displayName: 'Tarea: SonarCloud - Preparar Análisis'
      inputs:
        SonarQube: SonarCloud-Majo
        organization: quind
        projectKey: com.entrenamiento.Calculadora
        projectName: 'Calculadora'

    # Tarea: Ejecutar análisis de Sonar con Gradle
    - task: Gradle@3
      displayName: 'Tarea: Gradle - Ejecutar SonarQube'
      inputs:
        gradleWrapperFile: '$(wrapperScript)'
        tasks: 'sonarqube'
        jdkVersionOption: '17'

    # Tarea: Publicar resultados de calidad
    - task: SonarSource.sonarcloud.38b27399-a642-40af-bb7d-9971f69712e8.SonarCloudPublish@4
      displayName: 'Tarea: SonarCloud - Publicar Quality Gate'

    # Tarea: Copiar el .jar generado a la carpeta de artefactos
    - task: CopyFiles@2
      displayName: 'Tarea: Copiar Artefactos .jar'
      inputs:
        SourceFolder: '$(system.defaultworkingdirectory)'
        Contents: '**/*.jar'
        TargetFolder: '$(build.artifactstagingdirectory)'
      condition: succeededOrFailed()

    # Tarea: Publicar oficialmente el artefacto en Azure DevOps
    - task: PublishBuildArtifacts@1
      displayName: 'Tarea: Publicar Artefacto drop'
      inputs:
        PathtoPublish: '$(build.artifactstagingdirectory)'
      condition: succeededOrFailed()

# ----------------------------------------------------------------
# ETAPA 2: Terraform Infrastructure (Infraestructura con Terraform)
# ----------------------------------------------------------------
- stage: TerraformInfrastructure
  displayName: 'Terraform Infrastructure'
  dependsOn: DevelopmentIntegration
  jobs:
  - job: TerraformInfrastructureJob
    displayName: 'Terraform Infrastructure'
    steps:

    # Tarea: Descargar la llave pública SSH desde Secure Files
    - task: DownloadSecureFile@1
      name: sshPublicKey
      displayName: 'Tarea: Descargar SSH Public Key desde Secure Files'
      inputs:
        secureFile: 'azure_vm.pub'

    # Tarea: Exportar PUBLIC_KEY_PATH como variable de pipeline
    - script: echo "##vso[task.setvariable variable=PUBLIC_KEY_PATH]$(sshPublicKey.secureFilePath)"
      displayName: 'Tarea: Exportar PUBLIC_KEY_PATH como variable de pipeline'

    # Tarea: Leer contenido SSH Public Key y exportar como variable
    - script: echo "##vso[task.setvariable variable=SSH_PUBLIC_KEY]$(cat $(sshPublicKey.secureFilePath))"
      displayName: 'Tarea: Leer y exportar SSH Public Key como variable'

    # Tarea: Crear Storage Account para Terraform State
    - task: AzureCLI@2
      displayName: 'Tarea: Infra - Crear Storage Account para Terraform'
      inputs:
        azureSubscription: 'sc-majo-terraform-v2'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az storage account create --name stmajo1773169612 --resource-group resource-group-maria-jose-olivero --location eastus --sku Standard_LRS --min-tls-version TLS1_2
          az storage container create --name tfstate --account-name stmajo1773169612 --auth-mode login

    # Tarea: Reemplazar tokens en tfvars antes de Terraform
    - task: qetza.replacetokens.replacetokens-task.replacetokens@6
      displayName: 'Tarea: Reemplazar tokens en tfvars'
      inputs:
        targetFiles: terraform/*.tfvars
        tokenPrefix: '#{'
        tokenSuffix: '}#'

    # Tarea: Instalar herramienta Terraform
    - task: TerraformInstaller@1
      displayName: 'Tarea: Instalar Terraform'
      inputs:
        terraformVersion: 'latest'

    # Tarea: Ejecutar Terraform Init y Apply
    - task: AzureCLI@2
      displayName: 'Tarea: Terraform - Init y Apply'
      inputs:
        azureSubscription: 'sc-majo-terraform-v2'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd terraform
          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_CLIENT_SECRET=$servicePrincipalKey
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(subscription_id)
          
          terraform init -input=false
          terraform apply -auto-approve -input=false -lock-timeout=5m -lock=false -var="ssh_public_key=$(SSH_PUBLIC_KEY)"
        addSpnToEnvironment: true
      env:
        SSH_PUBLIC_KEY: $(SSH_PUBLIC_KEY)
        subscription_id: $(subscription_id)

# ----------------------------------------------------------------
# ETAPA 3: Technical Excellence (SCA & SAST)
# ----------------------------------------------------------------
- stage: TechnicalExcellence
  displayName: 'Technical Excellence'
  dependsOn:
    - DevelopmentIntegration
    - TerraformInfrastructure
  condition: succeeded()
  jobs:
  - job: SoftwareCompositionAnalysis
    displayName: 'Software Composition Analysis (SCA)'
    timeoutInMinutes: 120
    pool:
      name: 'Agent-Majo'
    steps:
      - checkout: self
        fetchDepth: 0

# Tarea: Descargar artefactos de la etapa de build para escanear dependencias
      - task: DownloadPipelineArtifact@2
        displayName: 'Download Build Artifact'
        inputs:
          buildType: 'current'
          artifactName: 'drop'
          downloadPath: '$(System.ArtifactsDirectory)'

      - task: dependency-check-build-task@6
        displayName: 'Run SCA - OWASP Dependency Check'
        inputs:
          projectName: 'OWASP Dependency Check'
          scanPath: '$(System.DefaultWorkingDirectory)'
          format: 'ALL'
          dependencyCheckVersion: '12.1.0'
          skipUpdate: false
          additionalArguments: >
            --nvdApiKey $(NVD_API_KEY)
            --nvdApiDelay 45000
            --nvdMaxRetryCount 25
        continueOnError: true

      - task: CmdLine@2
        displayName: 'Validate SCA Result'
        condition: succeededOrFailed()
        inputs:
          script: |
            echo "Dependency Check finalizado. Verificando reportes..."
            REPORT_DIR="$(Build.ArtifactStagingDirectory)"
            
            if ls $REPORT_DIR/dependency-check-report.* 1> /dev/null 2>&1; then
              echo "✓ Reportes generados correctamente"
              exit 0
            else
              echo "⚠ No se encontraron reportes - verificar logs"
              exit 0
            fi

# Tarea: Publicar reportes de OWASP como artefactos
      - task: PublishBuildArtifacts@1
        displayName: 'Publish SCA Report (OWASP Dependency Check)'
        inputs:
          ArtifactName: 'SCA Analysis Report (OWASP)'
          PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        condition: succeededOrFailed()

  - job: StaticApplicationSecurityTesting
    displayName: 'Static Application Security Testing (SAST)'
    pool:
      name: 'Agent-Majo'
    steps:
      - checkout: self
        fetchDepth: 1

# Tarea: Ejecutar ShiftLeft SAST Scan para análisis de seguridad estático
      - task: CmdLine@2
        displayName: 'Run SAST - ShiftLeft Scan'
        inputs:
          script: docker run --user $(id -u):$(id -g) -v "$(Build.SourcesDirectory):/app:cached" -v "$(Build.ArtifactStagingDirectory):/reports:cached" shiftleft/sast-scan scan --src /app --out_dir /reports/static-analysis || true
        continueOnError: true

# Tarea: Publicar reportes de SAST como artefactos para visibilidad en Azure DevOps
      - task: PublishBuildArtifacts@1
        displayName: 'Publish SAST Analysis Report'
        inputs:
          ArtifactName: 'Static Analysis (SAST)'
          PathtoPublish: '$(Build.ArtifactStagingDirectory)/static-analysis'
        condition: succeededOrFailed()

      - task: CmdLine@2
        displayName: 'Fix permissions after Docker run'
        condition: always()
        inputs:
          script: |
            sudo chown -R $(whoami):$(whoami) $(Build.ArtifactStagingDirectory) 2>/dev/null || true
            echo "Permissions fixed for next run"
        continueOnError: true

# ----------------------------------------------------------------
# ETAPA 4: Docker & Artifact Management
# ----------------------------------------------------------------
- stage: DockerArtifactManagement
  displayName: 'Artifact Management'
  dependsOn: TechnicalExcellence
  condition: succeeded()
  jobs:
  - job: DockerBuildJob
    displayName: 'Docker Build & Push'
    steps:

    # Tarea: Descargar el .jar de la etapa anterior
    - task: DownloadBuildArtifacts@0
      displayName: 'Tarea: Descargar Artefacto de Build'
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(System.ArtifactsDirectory)'

    # Paso de Script: Restaurar estructura de build para Docker
    - script: |
        mkdir -p build/libs
        find $(System.ArtifactsDirectory)/drop -name "*.jar" -exec cp {} build/libs/calculator-java-gradle-0.0.1-SNAPSHOT.jar \;
        ls -R build/libs/
      displayName: 'Script: Restaurar estructura para Docker'

    # Tarea: Reemplazar tokens en values.yaml
    - task: qetza.replacetokens.replacetokens-task.replacetokens@6
      displayName: 'Tarea: Reemplazar tokens en helm values.yaml'
      inputs:
        targetFiles: helm/calculadora/values.yaml
        tokenPrefix: '#{'
        tokenSuffix: '}#'

    # Tarea: Construir imagen Docker y subirla al ACR
    - task: AzureCLI@2
      displayName: 'Tarea: Docker - Build y Push a ACR'
      inputs:
        azureSubscription: 'sc-majo-terraform-v2'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name $(ACR_NAME)
          docker build --build-arg BUILD_ID=$(Build.BuildId) -f Dockerfile -t $(ACR_NAME).azurecr.io/calculadora:$(Build.BuildId) .
          docker tag $(ACR_NAME).azurecr.io/calculadora:$(Build.BuildId) $(ACR_NAME).azurecr.io/calculadora:latest
          docker push $(ACR_NAME).azurecr.io/calculadora:$(Build.BuildId)
          docker push $(ACR_NAME).azurecr.io/calculadora:latest

    # Tarea: Ejecutar análisis de seguridad con grype y generar reportes (Security in Infrastructure as Code - SIaC)
    - task: CmdLine@2
      displayName: "Security in Infrastructure as Code (SIaC)"
      inputs:
        script: |
          git clone https://github.com/opt-nc/grype-contribs.git
          cd grype-contribs
          export IMAGE=$(ACR_NAME).azurecr.io/calculadora:$(Build.BuildId)
          echo "☝︝ About to analyze $IMAGE with grype ❕"
          docker run --rm --volume /var/run/docker.sock:/var/run/docker.sock --volume $(System.DefaultWorkingDirectory)/grype-contribs/tmpl:/tmpl --name Grype anchore/grype:latest $(ACR_NAME).azurecr.io/calculadora:$(Build.BuildId) -o template -t /tmpl/csv-vulnerability_id-severity-no-headers.tmpl > work/analysis.csv
          echo "✅ grype analysis done."
          docker run --rm --volume /var/run/docker.sock:/var/run/docker.sock --volume $(System.DefaultWorkingDirectory)/grype-contribs/tmpl:/tmpl --name Grype anchore/grype:latest $(ACR_NAME).azurecr.io/calculadora:$(Build.BuildId)
          echo "$(tail -n +2 work/analysis.csv)" > work/analysis.csv
          echo "--------------------------------------------------------------------------------------"
          echo "➕ Aggregating data:"
          awk -F, '{a[$1]+=$2;}END{for(i in a)print i", "a[i];}' work/analysis.csv > work/analysis-aggregated.csv
          cat work/analysis-aggregated.csv
          docker run --rm --volume /var/run/docker.sock:/var/run/docker.sock --volume $(System.DefaultWorkingDirectory)/grype-contribs/tmpl:/tmpl --name Grype anchore/grype:latest $(ACR_NAME).azurecr.io/calculadora:$(Build.BuildId) -o template -t /tmpl/html-table.tmpl > results.html
      continueOnError: true

    # Tarea: Publicar reportes de grype como artefactos para visibilidad en Azure DevOps
    - task: PublishBuildArtifacts@1
      displayName: 'Publish HTML Report'
      inputs:
        ArtifactName: 'grype-results'
        PathtoPublish: '$(System.DefaultWorkingDirectory)/grype-contribs'

# ----------------------------------------------------------------
# ETAPA 5: Kubernetes Deployment
# ----------------------------------------------------------------
- stage: KubernetesDeployment
  displayName: 'Ecosystem Integration'
  dependsOn: DockerArtifactManagement
  condition: succeeded()
  jobs:
  - job: KubernetesDeploymentJob
    displayName: 'Kubernetes Deployment'
    steps:

    # Tarea: Obtener credenciales de AKS y crear namespace
    - task: AzureCLI@2
      displayName: 'Tarea: AKS - Obtener Credenciales y Crear Namespace'
      inputs:
        azureSubscription: 'sc-majo-terraform-v2'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials --resource-group resource-group-maria-jose-olivero --name aks-calculadora-majo --overwrite-existing
          kubectl create namespace $(K8S_NAMESPACE) 2>/dev/null || echo "Namespace already exists"
      continueOnError: true

    # Tarea: Instalar Helm en el agente
    - task: HelmInstaller@1
      displayName: 'Tarea: Instalar Helm'
      inputs:
        helmVersionToInstall: 'latest'

    # Tarea: Obtener credenciales ACR y crear secret
    - task: AzureCLI@2
      displayName: 'Tarea: ACR - Habilitar Admin, obtener credenciales y crear Secret'
      inputs:
        azureSubscription: 'sc-majo-terraform-v2'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr update -n $(ACR_NAME) --admin-enabled true
          ACR_PASSWORD=$(az acr credential show --name $(ACR_NAME) --query passwords[0].value -o tsv)
          
          kubectl create secret docker-registry acr-secret \
            --namespace $(K8S_NAMESPACE) \
            --docker-server=$(ACR_NAME).azurecr.io \
            --docker-username=$(ACR_NAME) \
            --docker-password=$ACR_PASSWORD \
            2>/dev/null || echo "Secret already exists"
      continueOnError: true

    # Tarea: Eliminar recursos previos (opcional)
    - task: AzureCLI@2
      displayName: 'Tarea: K8s - Limpiar Recursos Previos'
      inputs:
        azureSubscription: 'sc-majo-terraform-v2'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          kubectl delete service calculadora-service -n $(K8S_NAMESPACE) --ignore-not-found=true
          kubectl delete deployment calculadora-back -n $(K8S_NAMESPACE) --ignore-not-found=true
      continueOnError: true

    # Tarea: Desplegar con Helm (sin esperar a que esté ready)
    - task: AzureCLI@2
      displayName: 'Tarea: Helm - Instalar Release'
      inputs:
        azureSubscription: 'sc-majo-terraform-v2'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          helm uninstall calculadora -n "$(K8S_NAMESPACE)" --wait --ignore-not-found=true || true
          sleep 10
          helm install calculadora ./helm/calculadora \
            --namespace "$(K8S_NAMESPACE)" \
            --set "image.repository=$(ACR_NAME).azurecr.io/calculadora" \
            --set "image.tag=$(Build.BuildId)" \
            --set "app.port=8080" \
            --set "service.port=8080"
          
          echo "Helm install completed, waiting 30 seconds for pod to start..."
          sleep 30
      continueOnError: true
